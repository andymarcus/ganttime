<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timezone Gantt Chart</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.460.0/font/lucide.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f7fa;
      --surface: #ffffff;
      --border: #e2e8f0;
      --border-light: #edf2f7;
      --text: #1a202c;
      --text-secondary: #4a5568;
      --text-muted: #a0aec0;
      --accent: #4299e1;
      --danger: #fc8181;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 12px 36px rgba(0,0,0,0.12);
      --row-height: 40px;
      --label-width: 240px;
    }

    /* Row color palette matching screenshot */
    .palette-0  { --bar: #3db9d3; --bar-light: #e0f5fa; --bar-text: #fff; }
    .palette-1  { --bar: #68b984; --bar-light: #e3f5ea; --bar-text: #fff; }
    .palette-2  { --bar: #f5a623; --bar-light: #fef3dc; --bar-text: #fff; }
    .palette-3  { --bar: #e06b8d; --bar-light: #fce4ec; --bar-text: #fff; }
    .palette-4  { --bar: #7c8cf5; --bar-light: #e8ebfe; --bar-text: #fff; }
    .palette-5  { --bar: #5bbfb5; --bar-light: #ddf3f0; --bar-text: #fff; }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: var(--shadow-sm);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, #3db9d3, #68b984);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 17px;
      box-shadow: 0 3px 8px rgba(61,185,211,0.3);
    }

    header h1 {
      font-size: 18px; font-weight: 700;
      color: var(--text);
    }

    header h1 span { color: #3db9d3; }

    .controls {
      display: flex; align-items: center; gap: 12px;
    }

    .clock-badge {
      display: flex; align-items: center; gap: 6px;
      background: #edf8fb; color: #3db9d3;
      padding: 7px 12px; border-radius: 8px;
      font-size: 12px; font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .clock-badge i { font-size: 14px; }

    .search-wrapper { position: relative; }

    #tz-search {
      background: var(--surface);
      border: 1.5px solid var(--border);
      color: var(--text);
      padding: 8px 12px 8px 34px;
      border-radius: 8px;
      font-size: 13px; font-family: inherit;
      width: 260px; outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    #tz-search:focus {
      border-color: #3db9d3;
      box-shadow: 0 0 0 3px rgba(61,185,211,0.15);
    }
    #tz-search::placeholder { color: var(--text-muted); }

    .search-icon {
      position: absolute; left: 10px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted); font-size: 15px;
      pointer-events: none;
    }

    .tz-dropdown {
      position: absolute; top: calc(100% + 4px); left: 0;
      width: 320px; max-height: 280px; overflow-y: auto;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; z-index: 100; display: none;
      box-shadow: var(--shadow-lg);
    }
    .tz-dropdown.open { display: block; }

    .tz-dropdown-item {
      padding: 9px 12px; cursor: pointer;
      font-size: 13px; display: flex;
      align-items: center; gap: 8px;
      border-bottom: 1px solid var(--border-light);
      transition: background .1s;
    }
    .tz-dropdown-item:last-child { border-bottom: none; }
    .tz-dropdown-item:hover { background: #f0fafb; }
    .tz-dropdown-item .dd-icon { font-size: 15px; color: #3db9d3; }
    .tz-dropdown-item .dd-name { flex: 1; font-weight: 500; }
    .tz-dropdown-item .dd-offset {
      font-size: 11px; font-weight: 600;
      color: #3db9d3; background: #edf8fb;
      padding: 2px 7px; border-radius: 5px;
    }

    /* ── Gantt table ── */
    .gantt-wrap {
      padding: 16px 24px 32px;
      overflow-x: auto;
    }

    .gantt {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      min-width: 900px;
    }

    /* ── Column header (hours) ── */
    .gantt-head {
      display: flex; border-bottom: 1px solid var(--border);
    }

    .gantt-head-label {
      width: var(--label-width); min-width: var(--label-width);
      padding: 0 14px;
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: .04em;
      border-right: 1px solid var(--border);
      background: #fafbfc;
    }
    .gantt-head-label i { font-size: 14px; color: #3db9d3; }

    .gantt-head-hours {
      flex: 1; display: flex; background: #fafbfc;
    }

    .gantt-hour-col {
      flex: 1; text-align: center;
      font-size: 10px; font-weight: 600;
      color: var(--text-muted);
      padding: 10px 0 8px;
      border-right: 1px solid var(--border-light);
      position: relative;
      user-select: none;
    }
    .gantt-hour-col:last-child { border-right: none; }

    .gantt-hour-col .h-icon {
      display: block; font-size: 12px;
      margin-bottom: 2px; opacity: .55;
    }

    /* ── Timezone rows ── */
    .gantt-row {
      display: flex;
      border-bottom: 1px solid var(--border-light);
      transition: background .1s;
    }
    .gantt-row:last-child { border-bottom: none; }
    .gantt-row:hover { background: #f7fbfc; }

    /* Label cell */
    .gantt-row-label {
      width: var(--label-width); min-width: var(--label-width);
      padding: 0 12px;
      display: flex; align-items: center; gap: 10px;
      border-right: 1px solid var(--border);
      background: var(--surface);
      height: var(--row-height);
      position: relative;
    }

    .gantt-row:hover .gantt-row-label { background: #f7fbfc; }

    .row-icon {
      width: 26px; height: 26px;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
      background: var(--bar-light);
      color: var(--bar);
    }

    .row-info { flex: 1; min-width: 0; }

    .row-name {
      font-size: 12px; font-weight: 600;
      white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis;
    }

    .row-time {
      font-size: 10px; color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      display: flex; align-items: center; gap: 3px;
    }
    .row-time i { font-size: 10px; }

    .row-actions {
      display: flex; align-items: center; gap: 4px;
      opacity: 0; transition: opacity .15s;
    }
    .gantt-row:hover .row-actions { opacity: 1; }

    .row-action-btn {
      width: 22px; height: 22px;
      border: none; background: none;
      color: var(--text-muted); cursor: pointer;
      border-radius: 5px; font-size: 13px;
      display: flex; align-items: center; justify-content: center;
      transition: background .1s, color .1s;
    }
    .row-action-btn:hover { background: #fee2e2; color: #e53e3e; }

    /* Bar area */
    .gantt-row-bars {
      flex: 1; position: relative;
      height: var(--row-height);
      cursor: pointer;
    }

    /* Grid lines behind bars */
    .grid-lines {
      position: absolute; inset: 0;
      display: flex; pointer-events: none;
    }
    .grid-line {
      flex: 1;
      border-right: 1px solid var(--border-light);
    }
    .grid-line:last-child { border-right: none; }

    /* Background shading for hour types */
    .hour-bg {
      position: absolute; top: 0; bottom: 0;
      pointer-events: none;
    }
    .hour-bg.sleep-bg { background: rgba(160,174,192,0.07); }

    /* Gantt bars */
    .gantt-bar {
      position: absolute;
      top: 6px;
      height: calc(var(--row-height) - 12px);
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: var(--bar-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 8px;
      z-index: 2;
      transition: filter .15s, box-shadow .15s;
      cursor: pointer;
    }

    .gantt-bar:hover {
      filter: brightness(1.08);
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .gantt-bar i {
      font-size: 13px;
      margin-right: 5px;
      flex-shrink: 0;
    }

    .gantt-bar.work-bar {
      background: var(--bar);
    }

    .gantt-bar.off-bar {
      background: var(--bar-light);
      color: var(--bar);
      border: 1.5px solid var(--bar);
      opacity: .7;
    }

    .gantt-bar.sleep-bar {
      background: repeating-linear-gradient(
        -45deg,
        var(--bar-light),
        var(--bar-light) 3px,
        transparent 3px,
        transparent 6px
      );
      color: var(--bar);
      opacity: .45;
    }

    /* ── Now marker ── */
    .now-line {
      position: absolute; top: 0; bottom: 0;
      width: 2px; z-index: 10;
      background: #e53e3e;
      pointer-events: none;
    }
    .now-line::before {
      content: '';
      position: absolute; top: -3px; left: -4px;
      width: 10px; height: 10px;
      background: #e53e3e;
      border-radius: 50%;
      border: 2px solid #fff;
      box-shadow: 0 1px 4px rgba(229,62,62,0.4);
    }

    /* ── Tooltip ── */
    .hover-tooltip {
      position: fixed;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      z-index: 200;
      pointer-events: none;
      display: none;
      box-shadow: var(--shadow-lg);
      min-width: 210px;
    }
    .hover-tooltip.visible { display: block; }

    .tt-header {
      font-size: 10px; text-transform: uppercase;
      letter-spacing: .05em; color: var(--text-muted);
      font-weight: 700; margin-bottom: 8px;
      display: flex; align-items: center; gap: 5px;
    }
    .tt-header i { font-size: 12px; color: #3db9d3; }

    .tt-row {
      display: flex; justify-content: space-between;
      align-items: center; padding: 3px 0; font-size: 12px;
    }
    .tt-row .tt-tz {
      color: var(--text-secondary);
      display: flex; align-items: center; gap: 5px;
    }
    .tt-row .tt-tz i { font-size: 13px; }
    .tt-row .tt-time {
      font-weight: 700; font-variant-numeric: tabular-nums;
      color: var(--text);
    }

    .tt-hint {
      margin-top: 10px; padding-top: 8px;
      border-top: 1px solid var(--border-light);
      font-size: 10px; color: var(--text-muted);
      text-align: center; display: flex;
      align-items: center; justify-content: center; gap: 5px;
      font-weight: 500;
    }
    .tt-hint i { font-size: 12px; color: #3db9d3; }

    /* ── Dialog ── */
    .dialog-overlay {
      position: fixed; inset: 0;
      background: rgba(26,32,44,0.35);
      backdrop-filter: blur(6px);
      z-index: 300; display: none;
      align-items: center; justify-content: center;
    }
    .dialog-overlay.open { display: flex; }

    .dialog {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px 30px;
      width: 440px; max-width: 92vw;
      box-shadow: var(--shadow-lg);
      animation: dlgIn .2s ease-out;
    }
    @keyframes dlgIn {
      from { opacity: 0; transform: scale(.96) translateY(6px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .dlg-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 4px;
    }
    .dlg-header-icon {
      width: 38px; height: 38px;
      background: #edf8fb; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; color: #3db9d3;
    }
    .dlg-header h2 { font-size: 17px; font-weight: 700; }

    .dlg-sub {
      font-size: 12px; color: var(--text-muted);
      margin-bottom: 18px; margin-top: 4px;
      display: flex; flex-wrap: wrap; gap: 5px; align-items: center;
    }
    .tz-chip {
      display: inline-flex; align-items: center; gap: 3px;
      background: #edf8fb; color: #3db9d3;
      padding: 2px 8px; border-radius: 6px;
      font-size: 11px; font-weight: 600;
    }
    .tz-chip i { font-size: 10px; }

    .dialog label {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 5px; margin-top: 14px;
    }
    .dialog label:first-of-type { margin-top: 0; }
    .dialog label i { font-size: 13px; color: #3db9d3; }

    .dialog input,
    .dialog textarea {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      color: var(--text);
      padding: 9px 12px; border-radius: 8px;
      font-size: 13px; font-family: inherit;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .dialog input:focus,
    .dialog textarea:focus {
      border-color: #3db9d3;
      box-shadow: 0 0 0 3px rgba(61,185,211,0.12);
    }
    .dialog textarea { resize: vertical; min-height: 52px; }

    .time-inputs { display: flex; gap: 10px; }
    .time-inputs > div { flex: 1; }

    .dlg-actions {
      display: flex; justify-content: flex-end;
      gap: 8px; margin-top: 22px;
    }

    .btn {
      padding: 9px 18px; border-radius: 8px;
      font-size: 13px; font-weight: 600;
      cursor: pointer; border: none;
      display: flex; align-items: center; gap: 6px;
      font-family: inherit;
      transition: background .15s, transform .1s, box-shadow .15s;
    }
    .btn:active { transform: scale(.97); }
    .btn i { font-size: 14px; }

    .btn-ghost {
      background: var(--bg); color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: #edf2f7; }

    .btn-primary {
      background: linear-gradient(135deg, #3db9d3, #68b984);
      color: #fff;
      box-shadow: 0 3px 10px rgba(61,185,211,0.25);
    }
    .btn-primary:hover {
      box-shadow: 0 5px 16px rgba(61,185,211,0.35);
      filter: brightness(1.04);
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--text-muted);
    }
    .empty-icon {
      width: 64px; height: 64px;
      background: #edf8fb; border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px; font-size: 28px; color: #3db9d3;
    }
    .empty-state p { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .empty-state .hint { font-size: 12px; color: var(--text-muted); }
    .empty-state .hint i { vertical-align: -2px; }

    /* ── Ideal meeting banner ── */
    .ideal-banner {
      margin: 16px 24px 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: var(--shadow-sm);
    }

    .ideal-banner-icon {
      width: 38px; height: 38px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }

    .ideal-banner-icon.good {
      background: #e3f5ea; color: #38a169;
    }
    .ideal-banner-icon.partial {
      background: #fef3dc; color: #d69e2e;
    }
    .ideal-banner-icon.none {
      background: #fee2e2; color: #e53e3e;
    }

    .ideal-banner-content {
      flex: 1; min-width: 0;
    }

    .ideal-banner-title {
      font-size: 13px; font-weight: 700;
      display: flex; align-items: center; gap: 6px;
      margin-bottom: 2px;
    }

    .ideal-banner-detail {
      font-size: 12px; color: var(--text-secondary);
      display: flex; flex-wrap: wrap; align-items: center; gap: 4px;
    }

    .ideal-banner-detail .time-range {
      font-weight: 700; color: #38a169;
    }

    .ideal-banner-detail .time-range.partial {
      color: #d69e2e;
    }

    .ideal-tz-list {
      display: flex; flex-wrap: wrap; gap: 4px;
      margin-top: 5px;
    }

    .ideal-tz-chip {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 2px 8px; border-radius: 5px;
      font-size: 10px; font-weight: 600;
      background: #edf8fb; color: #3db9d3;
    }

    .ideal-tz-chip i { font-size: 10px; }

    .ideal-banner .schedule-btn {
      padding: 8px 14px; border-radius: 8px;
      font-size: 12px; font-weight: 600;
      cursor: pointer; border: none;
      display: flex; align-items: center; gap: 5px;
      font-family: inherit;
      background: linear-gradient(135deg, #3db9d3, #68b984);
      color: #fff;
      box-shadow: 0 2px 8px rgba(61,185,211,0.2);
      transition: box-shadow .15s, filter .15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .ideal-banner .schedule-btn:hover {
      box-shadow: 0 4px 14px rgba(61,185,211,0.3);
      filter: brightness(1.05);
    }

    .ideal-banner .schedule-btn i { font-size: 13px; }

    /* ── Map ── */
    .map-section {
      margin: 0 24px 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    .map-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: .04em;
      background: #fafbfc;
    }

    .map-header i { font-size: 15px; color: #3db9d3; }

    #map {
      height: 360px;
      width: 100%;
      background: #e8f4f8;
    }

    /* Leaflet overrides */
    .leaflet-popup-content-wrapper {
      border-radius: 10px !important;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12) !important;
      font-family: 'Inter', system-ui, sans-serif !important;
    }

    .leaflet-popup-content {
      margin: 12px 14px !important;
      font-size: 12px !important;
      line-height: 1.5 !important;
    }

    .leaflet-popup-content .popup-name {
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 2px;
    }

    .leaflet-popup-content .popup-time {
      color: var(--text-secondary);
      font-variant-numeric: tabular-nums;
    }

    .leaflet-popup-content .popup-offset {
      font-size: 11px;
      color: var(--text-muted);
    }

    .map-marker-label {
      background: var(--surface);
      border: 2px solid var(--bar);
      border-radius: 8px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 700;
      font-family: 'Inter', system-ui, sans-serif;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      color: var(--text);
    }

    .map-empty {
      height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      gap: 8px;
      font-size: 13px;
    }

    .map-empty i { font-size: 28px; opacity: 0.4; }

    .map-marker-tooltip {
      background: none !important;
      border: none !important;
      box-shadow: none !important;
      padding: 0 !important;
    }

    .map-marker-tooltip::before {
      display: none !important;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon"><i class="lucide-globe"></i></div>
    <h1><span>Timezone</span> Gantt</h1>
  </div>
  <div class="controls">
    <div class="clock-badge">
      <i class="lucide-clock"></i>

        <input type="time" id="m-end">

      <button class="btn btn-primary" id="dlg-create"><i class="lucide-external-link"></i> Google Calendar</button>
    </div>

<script>
// ── State ──
const state = {
  timezones: [],
  localTz: Intl.DateTimeFormat().resolvedOptions().timeZone,
};

const ALL_TZ = Intl.supportedValuesOf('timeZone');

const CONT_ICONS = {
  America:'lucide-map-pin', Europe:'lucide-landmark', Asia:'lucide-mountain-snow',
  Africa:'lucide-sun', Australia:'lucide-tree-palm', Pacific:'lucide-waves',
  Indian:'lucide-compass', Atlantic:'lucide-anchor', Arctic:'lucide-snowflake',
  Antarctica:'lucide-snowflake',
};
function tzIcon(tz) { return CONT_ICONS[tz.split('/')[0]] || 'lucide-globe'; }

function getOffsetStr(tz) {
  const parts = new Intl.DateTimeFormat('en-US',{timeZone:tz,timeZoneName:'shortOffset'}).formatToParts(new Date());
  return (parts.find(p=>p.type==='timeZoneName')||{}).value||'';
}

function fmtTime(d,tz) {
  return d.toLocaleTimeString('en-US',{timeZone:tz,hour:'2-digit',minute:'2-digit',hour12:true});
}

function hourInTz(baseHour,tz) {
  const n=new Date(), d=new Date(n.getFullYear(),n.getMonth(),n.getDate(),baseHour,0,0);
  return parseInt(d.toLocaleString('en-US',{timeZone:tz,hour:'numeric',hour12:false}),10);
}

function hourCat(h) {
  if(h>=9&&h<17) return 'work';
  if(h>=22||h<7) return 'sleep';
  return 'off';
}

function shortName(tz) { return tz.replace(/_/g,' ').split('/').pop(); }

function getHourIcon(h) {
  if(h===0||h===23) return 'lucide-moon';
  if(h===6) return 'lucide-sunrise';
  if(h===9) return 'lucide-briefcase';
  if(h===12) return 'lucide-sun';
  if(h===17) return 'lucide-sunset';
  if(h===21) return 'lucide-moon-star';
  return '';
}

// Persistence
function save() { localStorage.setItem('tz-gantt-zones',JSON.stringify(state.timezones)); }
function load() {
  const s=localStorage.getItem('tz-gantt-zones');
  if(s) try{state.timezones=JSON.parse(s)}catch{state.timezones=[state.localTz]}
  else state.timezones=[state.localTz];
}

// ── Ideal meeting time ──
function computeIdealMeeting() {
  const banner = document.getElementById('ideal-banner');
  if (state.timezones.length < 2) {
    banner.style.display = 'none';
    return;
  }

  // For each local hour (0-23), check what hour it is in every timezone
  // Score: work (9-17)=2, off (7-9,17-22)=1, sleep=0
  function score(h) {
    if (h >= 9 && h < 17) return 2;
    if (h >= 22 || h < 7) return 0;
    return 1;
  }

  const hourScores = [];
  for (let h = 0; h < 24; h++) {
    let total = 0;
    let allWork = true;
    state.timezones.forEach(tz => {
      const tzH = hourInTz(h, tz);
      const s = score(tzH);
      total += s;
      if (s < 2) allWork = false;
    });
    hourScores.push({ hour: h, total, allWork });
  }

  // Find longest contiguous run where all are in work hours
  let bestStart = -1, bestLen = 0, curStart = -1, curLen = 0;
  for (let h = 0; h < 24; h++) {
    if (hourScores[h].allWork) {
      if (curStart === -1) curStart = h;
      curLen++;
      if (curLen > bestLen) { bestStart = curStart; bestLen = curLen; }
    } else {
      curStart = -1; curLen = 0;
    }
  }

  // If no full overlap, find best scoring contiguous block of at least 1 hour
  let partialStart = -1, partialLen = 0;
  if (bestLen === 0) {
    // Find the hour block with highest average score
    let bestScore = -1;
    for (let h = 0; h < 24; h++) {
      // Try blocks of 1-3 hours
      for (let len = Math.min(3, 24 - h); len >= 1; len--) {
        let tot = 0, minS = Infinity;
        for (let k = 0; k < len; k++) {
          tot += hourScores[h + k].total;
          minS = Math.min(minS, hourScores[h + k].total);
        }
        // Only consider blocks where nobody is sleeping (min score per tz > 0)
        let anyoneSleeping = false;
        for (let k = 0; k < len; k++) {
          state.timezones.forEach(tz => {
            const tzH = hourInTz(h + k, tz);
            if (score(tzH) === 0) anyoneSleeping = true;
          });
        }
        if (!anyoneSleeping && tot > bestScore) {
          bestScore = tot;
          partialStart = h;
          partialLen = len;
        }
      }
    }
  }

  const now = new Date();

  function fmtHour(h) {
    const d = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, 0, 0);
    return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
  }

  banner.style.display = 'flex';

  if (bestLen > 0) {
    // Perfect overlap
    const startStr = fmtHour(bestStart);
    const endStr = fmtHour(bestStart + bestLen);
    const tzChips = state.timezones.map(tz => {
      const d = new Date(now.getFullYear(), now.getMonth(), now.getDate(), bestStart, 0, 0);
      return `<span class="ideal-tz-chip"><i class="${tzIcon(tz)}"></i> ${shortName(tz)}: ${fmtTime(d, tz)}</span>`;
    }).join('');

    banner.innerHTML = `
      <div class="ideal-banner-icon good"><i class="lucide-sparkles"></i></div>
      <div class="ideal-banner-content">
        <div class="ideal-banner-title"><i class="lucide-check-circle" style="font-size:14px;color:#38a169"></i> Ideal meeting window found</div>
        <div class="ideal-banner-detail">
          <span class="time-range">${startStr} - ${endStr}</span>
          <span>your time &middot; ${bestLen}h overlap where everyone is in work hours</span>
        </div>
        <div class="ideal-tz-list">${tzChips}</div>
      </div>
      <button class="schedule-btn" id="ideal-schedule"><i class="lucide-calendar-plus"></i> Schedule</button>`;

    document.getElementById('ideal-schedule').addEventListener('click', () => openDialog(bestStart));
  } else if (partialStart >= 0) {
    const startStr = fmtHour(partialStart);
    const endStr = fmtHour(partialStart + partialLen);
    const tzChips = state.timezones.map(tz => {
      const d = new Date(now.getFullYear(), now.getMonth(), now.getDate(), partialStart, 0, 0);
      return `<span class="ideal-tz-chip"><i class="${tzIcon(tz)}"></i> ${shortName(tz)}: ${fmtTime(d, tz)}</span>`;
    }).join('');

    banner.innerHTML = `
      <div class="ideal-banner-icon partial"><i class="lucide-alert-triangle"></i></div>
      <div class="ideal-banner-content">
        <div class="ideal-banner-title"><i class="lucide-info" style="font-size:14px;color:#d69e2e"></i> Best compromise window</div>
        <div class="ideal-banner-detail">
          <span class="time-range partial">${startStr} - ${endStr}</span>
          <span>your time &middot; no perfect overlap, but nobody is sleeping</span>
        </div>
        <div class="ideal-tz-list">${tzChips}</div>
      </div>
      <button class="schedule-btn" id="ideal-schedule"><i class="lucide-calendar-plus"></i> Schedule</button>`;

    document.getElementById('ideal-schedule').addEventListener('click', () => openDialog(partialStart));
  } else {
    const tzChips = state.timezones.map(tz =>
      `<span class="ideal-tz-chip"><i class="${tzIcon(tz)}"></i> ${shortName(tz)}</span>`
    ).join('');

    banner.innerHTML = `
      <div class="ideal-banner-icon none"><i class="lucide-x-circle"></i></div>
      <div class="ideal-banner-content">
        <div class="ideal-banner-title"><i class="lucide-alert-circle" style="font-size:14px;color:#e53e3e"></i> No good overlap found</div>
        <div class="ideal-banner-detail">
          <span>These timezones are too far apart &mdash; someone will always be outside waking hours</span>
        </div>
        <div class="ideal-tz-list">${tzChips}</div>
      </div>`;
  }
}

// ── Render hour header ──
function renderHead() {
  const c=document.getElementById('head-hours');
  c.innerHTML='';
  for(let h=0;h<24;h++){
    const d=document.createElement('div');
    d.className='gantt-hour-col';
    const ic=getHourIcon(h);
    d.innerHTML=(ic?`<span class="h-icon"><i class="${ic}"></i></span>`:'')+h.toString().padStart(2,'0');
    c.appendChild(d);
  }
}

// ── Render rows ──
function renderBody() {
  const body=document.getElementById('gantt-body');
  body.innerHTML='';

  if(!state.timezones.length){
    body.innerHTML=`<div class="empty-state">
      <div class="empty-icon"><i class="lucide-globe"></i></div>
      <p>No timezones added yet</p>
      <p class="hint"><i class="lucide-search" style="font-size:13px"></i> Search above to add timezones</p>
    </div>`;
    return;
  }

  const now=new Date();

  state.timezones.forEach((tz,idx)=>{
    const palette=idx%6;
    const row=document.createElement('div');
    row.className=`gantt-row palette-${palette}`;

    // Label
    const label=document.createElement('div');
    label.className='gantt-row-label';
    label.innerHTML=`
      <div class="row-icon"><i class="${tzIcon(tz)}"></i></div>
      <div class="row-info">
        <div class="row-name" title="${tz}">${shortName(tz)}</div>
        <div class="row-time"><i class="lucide-clock"></i> ${fmtTime(now,tz)} &middot; ${getOffsetStr(tz)}</div>
      </div>
      <div class="row-actions">
        <button class="row-action-btn remove-btn" data-idx="${idx}" title="Remove"><i class="lucide-trash-2"></i></button>
      </div>`;
    row.appendChild(label);

    // Bar area
    const bars=document.createElement('div');
    bars.className='gantt-row-bars';
    bars.dataset.tz=tz;

    // Grid lines
    const grid=document.createElement('div');
    grid.className='grid-lines';
    for(let i=0;i<24;i++){
      const gl=document.createElement('div');
      gl.className='grid-line';
      grid.appendChild(gl);
    }
    bars.appendChild(grid);

    // Build contiguous segments of same category
    const segments=[];
    let cur=null;
    for(let h=0;h<24;h++){
      const tzH=hourInTz(h,tz);
      const cat=hourCat(tzH);
      if(cur&&cur.cat===cat){ cur.end=h+1; }
      else { cur={cat,start:h,end:h+1,startTzH:tzH}; segments.push(cur); }
    }

    const barLabels={
      work:{icon:'lucide-briefcase',text:'Work hours'},
      off:{icon:'lucide-coffee',text:'Free time'},
      sleep:{icon:'lucide-moon',text:'Sleep'},
    };

    segments.forEach(seg=>{
      const bar=document.createElement('div');
      const left=(seg.start/24*100).toFixed(3);
      const width=((seg.end-seg.start)/24*100).toFixed(3);
      bar.className=`gantt-bar ${seg.cat}-bar`;
      bar.style.left=left+'%';
      bar.style.width=width+'%';

      const info=barLabels[seg.cat];
      // Only show label if bar is wide enough
      const span=seg.end-seg.start;
      if(span>=3){
        bar.innerHTML=`<i class="${info.icon}"></i>${info.text}`;
      } else if(span>=2){
        bar.innerHTML=`<i class="${info.icon}"></i>`;
      }
      bars.appendChild(bar);
    });

    // Now marker
    const nowFrac=(now.getHours()+now.getMinutes()/60)/24*100;
    const mk=document.createElement('div');
    mk.className='now-line';
    mk.style.left=nowFrac+'%';
    bars.appendChild(mk);

    row.appendChild(bars);
    body.appendChild(row);
  });

  // Bind remove
  body.querySelectorAll('.remove-btn').forEach(b=>{
    b.addEventListener('click',e=>{
      e.stopPropagation();
      state.timezones.splice(parseInt(b.dataset.idx),1);
      save(); renderBody();
    });
  });

  bindEvents();
  computeIdealMeeting();
  renderMap();
}

// ── Hover + Click ──
function bindEvents(){
  const tip=document.getElementById('tooltip');
  document.querySelectorAll('.gantt-row-bars').forEach(bars=>{
    bars.addEventListener('mousemove',e=>{
      const r=bars.getBoundingClientRect();
      const pct=(e.clientX-r.left)/r.width;
      const fh=pct*24, lh=Math.floor(fh), mn=Math.floor((fh-lh)*60);
      const now=new Date();
      const base=new Date(now.getFullYear(),now.getMonth(),now.getDate(),lh,mn,0);

      let html=`<div class="tt-header"><i class="lucide-clock"></i> Time across zones</div>`;
      state.timezones.forEach(tz=>{
        html+=`<div class="tt-row">
          <span class="tt-tz"><i class="${tzIcon(tz)}"></i> ${shortName(tz)}</span>
          <span class="tt-time">${fmtTime(base,tz)}</span>
        </div>`;
      });
      html+=`<div class="tt-hint"><i class="lucide-mouse-pointer-click"></i> Click to schedule</div>`;
      tip.innerHTML=html;
      tip.classList.add('visible');

      let tx=e.clientX+14, ty=e.clientY-8;
      if(tx+tip.offsetWidth>window.innerWidth-10) tx=e.clientX-tip.offsetWidth-14;
      if(ty+tip.offsetHeight>window.innerHeight-10) ty=window.innerHeight-tip.offsetHeight-10;
      tip.style.left=tx+'px'; tip.style.top=ty+'px';
    });

    bars.addEventListener('mouseleave',()=>tip.classList.remove('visible'));

    bars.addEventListener('click',e=>{
      const r=bars.getBoundingClientRect();
      const lh=Math.floor((e.clientX-r.left)/r.width*24);
      tip.classList.remove('visible');
      openDialog(lh);
    });
  });
}

// ── Dialog ──
function openDialog(startH){
  const ov=document.getElementById('dialog-overlay');
  const now=new Date();
  const base=new Date(now.getFullYear(),now.getMonth(),now.getDate(),startH,0,0);
  document.getElementById('dlg-sub').innerHTML=state.timezones.map(tz=>
    `<span class="tz-chip"><i class="${tzIcon(tz)}"></i> ${shortName(tz)}: ${fmtTime(base,tz)}</span>`
  ).join('');
  document.getElementById('m-title').value='';
  document.getElementById('m-desc').value='';
  document.getElementById('m-start').value=startH.toString().padStart(2,'0')+':00';
  document.getElementById('m-end').value=Math.min(startH+1,23).toString().padStart(2,'0')+':00';
  const ds=`${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')}`;
  document.getElementById('m-date').value=ds;
  ov.classList.add('open');
  setTimeout(()=>document.getElementById('m-title').focus(),100);
}

function closeDialog(){ document.getElementById('dialog-overlay').classList.remove('open'); }

function gcalUrl(){
  const title=document.getElementById('m-title').value||'Meeting';
  const desc=document.getElementById('m-desc').value;
  const date=document.getElementById('m-date').value;
  const start=document.getElementById('m-start').value;
  const end=document.getElementById('m-end').value;
  const fmt=(d,t)=>d.replace(/-/g,'')+'T'+t.replace(':','')+'00';
  const baseDate=new Date(`${date}T${start}:00`);
  const tzInfo=state.timezones.map(tz=>`${shortName(tz)}: ${fmtTime(baseDate,tz)}`).join('\n');
  const full=desc?`${desc}\n\n---\nTimezones:\n${tzInfo}`:`Timezones:\n${tzInfo}`;
  const p=new URLSearchParams({action:'TEMPLATE',text:title,dates:`${fmt(date,start)}/${fmt(date,end)}`,details:full,ctz:state.localTz});
  return `https://calendar.google.com/calendar/render?${p}`;
}

// ── Search ──
const searchInput=document.getElementById('tz-search');
const dd=document.getElementById('tz-dropdown');
searchInput.addEventListener('focus',()=>updateDD());
searchInput.addEventListener('input',()=>updateDD());
searchInput.addEventListener('blur',()=>setTimeout(()=>dd.classList.remove('open'),150));

function updateDD(){
  const q=searchInput.value.toLowerCase().trim();
  const list=ALL_TZ
    .filter(tz=>!state.timezones.includes(tz))
    .filter(tz=>!q||tz.toLowerCase().includes(q)||getOffsetStr(tz).toLowerCase().includes(q))
    .slice(0,18);
  if(!list.length){
    dd.innerHTML='<div style="padding:12px;text-align:center;color:var(--text-muted);font-size:12px"><i class="lucide-search-x" style="font-size:14px;vertical-align:-2px;margin-right:4px"></i> No matches</div>';
  } else {
    dd.innerHTML=list.map(tz=>`<div class="tz-dropdown-item" data-tz="${tz}">
      <i class="${tzIcon(tz)} dd-icon"></i>
      <span class="dd-name">${tz.replace(/_/g,' ')}</span>
      <span class="dd-offset">${getOffsetStr(tz)}</span>
    </div>`).join('');
  }
  dd.classList.add('open');
  dd.querySelectorAll('.tz-dropdown-item').forEach(it=>{
    it.addEventListener('mousedown',e=>{
      e.preventDefault();
      state.timezones.push(it.dataset.tz);
      save(); searchInput.value=''; dd.classList.remove('open');
      renderBody();
    });
  });
}

// ── Clock ──
function tick(){
  document.getElementById('clock-text').textContent=fmtTime(new Date(),state.localTz)+' '+getOffsetStr(state.localTz);
}

// ── Events ──
document.getElementById('dlg-cancel').addEventListener('click',closeDialog);
document.getElementById('dialog-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeDialog()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDialog()});
document.getElementById('dlg-create').addEventListener('click',()=>{window.open(gcalUrl(),'_blank');closeDialog()});

// Fallback: estimate coords from offset for unknown timezones
function estimateCoords(tz) {
  if (TZ_COORDS[tz]) return TZ_COORDS[tz];
  // Try partial match on city name
  const city = tz.split('/').pop();
  for (const [key, val] of Object.entries(TZ_COORDS)) {
    if (key.endsWith('/' + city)) return val;
  }
  // Rough estimate: longitude from UTC offset, latitude from continent
  const offMin = (()=>{
    const n=new Date();
    const u=new Date(n.toLocaleString('en-US',{timeZone:'UTC'}));
    const t=new Date(n.toLocaleString('en-US',{timeZone:tz}));
    return (t-u)/60000;
  })();
  const lng = offMin / 4; // 1 hour = 15 degrees
  const continent = tz.split('/')[0];
  const latMap = {America:25,Europe:50,Asia:35,Africa:5,Australia:-28,Pacific:-10,Indian:-5,Arctic:75,Antarctica:-80};
  return [latMap[continent]||30, lng];
}

const PALETTE_COLORS = ['#3db9d3','#68b984','#f5a623','#e06b8d','#7c8cf5','#5bbfb5'];

let map = null;
let mapMarkers = [];
let nightLayer = null;
let twilightLayer = null;

// ── Solar calculations ──
function getSunPosition(date) {
  // Julian date
  const JD = date.getTime() / 86400000 + 2440587.5;
  const D = JD - 2451545.0; // days since J2000.0
  // Mean longitude and anomaly
  const g = (357.529 + 0.98560028 * D) * Math.PI / 180;
  const q = 280.459 + 0.98564736 * D;
  // Ecliptic longitude
  const L = (q + 1.915 * Math.sin(g) + 0.020 * Math.sin(2 * g)) * Math.PI / 180;
  // Obliquity of ecliptic
  const e = (23.439 - 0.00000036 * D) * Math.PI / 180;
  // Sun declination
  const decl = Math.asin(Math.sin(e) * Math.sin(L));
  // Right ascension
  const RA = Math.atan2(Math.cos(e) * Math.sin(L), Math.cos(L));
  // Greenwich Mean Sidereal Time (hours)
  const GMST = (18.697374558 + 24.06570982441908 * D) % 24;
  // Subsolar longitude
  const subLng = (RA * 180 / Math.PI - GMST * 15);
  return {
    decl: decl, // radians
    subLat: decl * 180 / Math.PI,
    subLng: ((subLng % 360) + 540) % 360 - 180,
  };
}

function getTerminatorCoords(date, offsetAngle) {
  // offsetAngle: 0 = terminator, 6 = civil twilight, 12 = nautical, 18 = astronomical
  const sun = getSunPosition(date);
  const points = [];
  const rad = Math.PI / 180;
  // The terminator is where solar altitude = -offsetAngle degrees
  // cos(zenith) = sin(lat)*sin(decl) + cos(lat)*cos(decl)*cos(hourAngle)
  // At terminator, zenith = 90 + offsetAngle degrees
  const cosZenith = Math.cos((90 + offsetAngle) * rad);

  for (let lng = -180; lng <= 180; lng += 1) {
    const hourAngle = (lng - sun.subLng) * rad;
    // solve for lat: sin(lat)*sin(decl) + cos(lat)*cos(decl)*cos(ha) = cosZenith
    // A*sin(lat) + B*cos(lat) = C where A=sin(decl), B=cos(decl)*cos(ha), C=cosZenith
    const A = Math.sin(sun.decl);
    const B = Math.cos(sun.decl) * Math.cos(hourAngle);
    const C = cosZenith;
    const R = Math.sqrt(A * A + B * B);
    if (Math.abs(C / R) > 1) {
      // No solution at this longitude — either perpetual day or night
      // Use +/-90 depending on whether sun is above or below
      const lat = (A > 0 ? 90 : -90) * (C > 0 ? 1 : -1);
      points.push([lat, lng]);
      continue;
    }
    const phi = Math.atan2(A, B);
    const lat = Math.asin(C / R);
    const solvedLat = (phi + lat) * 180 / Math.PI; // one of two solutions
    // Clamp
    points.push([Math.max(-90, Math.min(90, solvedLat)), lng]);
  }
  return points;
}

function buildNightPolygon(terminatorCoords, date) {
  const sun = getSunPosition(date);
  // The night polygon is on the opposite side of the terminator from the sun
  // If subsolar latitude > 0 (northern summer), night is south of the terminator in most places
  // We build the polygon by closing the terminator with the correct pole
  const nightPole = sun.subLat >= 0 ? -90 : 90;
  const poly = [];
  // Go along terminator left to right
  for (const pt of terminatorCoords) {
    poly.push(pt);
  }
  // Close along the bottom/top edge
  poly.push([nightPole, 180]);
  poly.push([nightPole, -180]);
  return poly;
}

function initMap() {
  map = L.map('map', {
    scrollWheelZoom: true,
    zoomControl: true,
    attributionControl: true,
  }).setView([20, 0], 2);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 12,
  }).addTo(map);
}

function updateDayNight() {
  const now = new Date();

  // Remove old layers
  if (nightLayer) { map.removeLayer(nightLayer); nightLayer = null; }
  if (twilightLayer) { map.removeLayer(twilightLayer); twilightLayer = null; }

  // Twilight zone (civil twilight = 6 degrees below horizon)
  const twilightCoords = getTerminatorCoords(now, 6);
  const twilightPoly = buildNightPolygon(twilightCoords, now);
  twilightLayer = L.polygon(twilightPoly, {
    color: 'none',
    fillColor: '#1a202c',
    fillOpacity: 0.08,
    interactive: false,
  }).addTo(map);

  // Night (sun below horizon = 0 degrees)
  const termCoords = getTerminatorCoords(now, 0);
  const nightPoly = buildNightPolygon(termCoords, now);
  nightLayer = L.polygon(nightPoly, {
    color: 'none',
    fillColor: '#1a202c',
    fillOpacity: 0.22,
    interactive: false,
  }).addTo(map);
}

function renderMap() {
  if (!map) return;

  // Clear old markers
  mapMarkers.forEach(m => map.removeLayer(m));
  mapMarkers = [];

  // Update day/night overlay
  updateDayNight();

  if (!state.timezones.length) return;

  const now = new Date();
  const bounds = [];

  state.timezones.forEach((tz, idx) => {
    const [lat, lng] = estimateCoords(tz);
    const color = PALETTE_COLORS[idx % 6];
    bounds.push([lat, lng]);

    // Determine if location is in daylight
    const sun = getSunPosition(now);
    const rad = Math.PI / 180;
    const ha = (lng - sun.subLng) * rad;
    const sinAlt = Math.sin(lat * rad) * Math.sin(sun.decl) + Math.cos(lat * rad) * Math.cos(sun.decl) * Math.cos(ha);
    const isDaylight = sinAlt > 0;
    const isTwilight = sinAlt > -0.1045 && sinAlt <= 0; // ~6 degrees

    // Pulse ring — brighter in daylight
    const pulse = L.circleMarker([lat, lng], {
      radius: 20,
      fillColor: isDaylight ? '#fbbf24' : '#6366f1',
      color: isDaylight ? '#fbbf24' : '#6366f1',
      weight: 1,
      opacity: isDaylight ? 0.25 : 0.15,
      fillOpacity: isDaylight ? 0.08 : 0.05,
    }).addTo(map);
    mapMarkers.push(pulse);

    // Main marker
    const marker = L.circleMarker([lat, lng], {
      radius: 10,
      fillColor: color,
      color: '#fff',
      weight: 3,
      opacity: 1,
      fillOpacity: isDaylight ? 0.95 : 0.7,
    }).addTo(map);

    // Day/night icon in tooltip
    const dayIcon = isDaylight ? '\u2600\uFE0F' : isTwilight ? '\uD83C\uDF05' : '\uD83C\uDF19';

    // Label tooltip
    const label = L.tooltip({
      permanent: true,
      direction: 'top',
      offset: [0, -14],
      className: 'map-marker-tooltip',
    }).setContent(
      `<div style="
        background:${color};
        color:#fff;
        padding:3px 9px;
        border-radius:6px;
        font-size:11px;
        font-weight:700;
        font-family:Inter,system-ui,sans-serif;
        white-space:nowrap;
        box-shadow:0 2px 8px rgba(0,0,0,0.2);
      ">${dayIcon} ${shortName(tz)}</div>`
    );
    marker.bindTooltip(label);

    // Popup
    marker.bindPopup(`
      <div class="popup-name" style="color:${color}">${dayIcon} ${shortName(tz)}</div>
      <div class="popup-time">${fmtTime(now, tz)}</div>
      <div class="popup-offset">${tz} &middot; ${getOffsetStr(tz)}</div>
      <div style="font-size:11px;color:#a0aec0;margin-top:3px">${isDaylight ? 'Daytime' : isTwilight ? 'Twilight' : 'Nighttime'}</div>
    `);

    mapMarkers.push(marker, label);
  });

  // Connection lines
  if (state.timezones.length > 1) {
    const line = L.polyline(bounds, {
      color: '#3db9d3',
      weight: 2,
      opacity: 0.3,
      dashArray: '6 4',
    }).addTo(map);
    mapMarkers.push(line);
  }

  // Fit bounds
  if (bounds.length === 1) {
    map.setView(bounds[0], 5);
  } else {
    map.fitBounds(bounds, { padding: [50, 50], maxZoom: 6 });
  }
}

// ── Init ──
load(); renderHead(); renderBody(); tick();
initMap(); renderMap();
setInterval(()=>{tick();renderBody();},30000);
// Update day/night shadow every 5 minutes
setInterval(()=>{updateDayNight();},300000);
</script>
